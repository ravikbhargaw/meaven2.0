name: Daily AI Blog Post

on:
  schedule:
    # 04:30 UTC is 10:00 AM IST
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Check API Key
      run: |
        if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
          echo "Error: GEMINI_API_KEY is not set in GitHub Secrets."
          exit 1
        fi

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai

    - name: Generate Blog Post
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scripts/generate_blog.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Automated: Daily AI Blog Post" || echo "No changes to commit"
        git push
